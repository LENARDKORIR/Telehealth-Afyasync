# render.yaml - blueprint to create API and frontend services on Render
services:
  - type: web
    name: afyasyncc-api
    env: node
    repoName: LENARDKORIR/Telehealth-Afyasync
    plan: free
    root: .
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
    secrets:
      - key: DATABASE_URL

  - type: static
    name: afyasyncc-web
    env: static
    repoName: LENARDKORIR/Telehealth-Afyasync
    plan: free
    root: .
    buildCommand: cd client && npm ci && npm run build
    publishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://afyasyncc-api.onrender.com/api
